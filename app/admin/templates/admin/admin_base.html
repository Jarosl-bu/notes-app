<!DOCTYPE html>
<html lang="en">
<head>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='logo.ico') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-dark bg-black px-3">
        <h1>
            {{ title }}
        </h1>

        {% block dashboard %}{% endblock %}

        {% if current_user.is_authenticated %}

        <form action="{{ url_for('auth.logout') }}", method="POST">
            <button class="btn btn-outline-light" type="submit">Log out</button>
        </form>

        {% else %}

        <div>
     
            <form class="btn-form" method="GET" action="{{url_for('auth.register')}}"><button class = "btn btn-outline-light">Register</button></form>
            <form class="btn-form" method="GET" action="{{url_for('auth.login')}}"><button class = "btn btn-outline-light">Log in</button></form>
      
         </div>

        {% endif %}
     

     
     </nav>
    <div>
        {% for msg in get_flashed_messages() %}
        <div class="alert alert-danger"><p>{{ msg }}</p></div>
        {% endfor %}
    </div>

    {% block body %}{% endblock %}


</body>
</html>
