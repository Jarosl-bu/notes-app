<!DOCTYPE html>
<html lang="en">
<head>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/styles.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='logo.ico') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-dark bg-black px-3">

        <a class="navbar-brand" href="/notes">
            My Notes
        </a>
     
        
        <div>
     
           <button class = "btn btn-outline-light" id = "btn-create-note">Create a note</button>
           <button class = "btn btn-outline-light" id = "btn-create-list">Create a list</button>
     
        </div>
     
        <form action="{{ url_for('auth.logout') }}", method="POST"><button class="btn btn-outline-light" type="submit">Log out</button></form>

        {% if current_user.is_admin %}

            <form action="{{ url_for('admin.dashboard') }}", method="GET">
                <button class="btn btn-outline-light" type="submit">Admin's panel</button>
            </form>
        {% endif %}
     
     </nav>

    {% block body %}{% endblock %}


</body>
</html>
